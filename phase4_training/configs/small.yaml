# Small config — the real training run (~15M params)
# Train on ROG SCAR 17 (RTX 3090): ~1.5-3 hours
# Train on MacBook M4 (MPS): ~4-8 hours (not recommended for full run)

model:
  vocab_size: 4096
  n_layer: 6
  n_head: 6
  n_kv_head: 2
  n_embd: 384
  block_size: 256
  ffn_hidden: 1024
  dropout: 0.1
  bias: false

training:
  max_steps: 10000
  micro_batch_size: 16         # 16 on 3090 (fp16), reduce to 8 on M4 (fp32)
  grad_accum_steps: 4          # effective batch = 16 * 4 = 64
  max_lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_fraction: 0.05        # 500 warmup steps
  decay_fraction: 0.20         # 2000 decay steps

  # Logging
  log_interval: 50
  eval_interval: 500
  checkpoint_interval: 1000

  # Data
  data_source: "tinystories"   # or "fineweb-edu"
  max_chars: null              # null = use full dataset
